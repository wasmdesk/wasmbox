# Taskfile for wasmbox — https://taskfile.dev
#
#   task            # list the available tasks
#   task build      # build wasmbox.wasm (embeds compositor.rb) + hello client + wasm_exec.js
#   task serve      # build, then serve http://localhost:8080/ with COOP/COEP
#   task test       # run native Go + Ruby unit tests
#   task clean      # remove the build artifacts
#
# wasmbox is a Go module that imports the pure-Go (CGO=0) go-embedded-ruby
# interpreter and bakes compositor.rb into the wasm with //go:embed. Step B
# adds an external-client path: a Web Worker hosting a separate Go/wasm client
# (clients/hello) talking to the compositor through postMessage +
# SharedArrayBuffer. SAB needs COOP/COEP, which python3 -m http.server does
# not set — cmd/serve does.
version: "3"

vars:
  PORT: "8080"
  ENGINE_DIR: '{{default "../../go-quake1/engine" .ENGINE_DIR}}'
  DOCK_DIR: '{{default "../wasmdock" .DOCK_DIR}}'

tasks:
  default:
    desc: List the available tasks
    silent: true
    cmds:
      - task --list

  build:
    desc: Build wasmbox.wasm + hello + dock clients + copy wasm_exec.js
    deps: [build:compositor, build:hello, build:dock, build:serve]

  build:all:
    desc: Build everything incl. the external go-quake1 + wasmdock clients
    deps: [build:compositor, build:hello, build:quake, build:dock, build:serve]

  build:dock:
    desc: Build the wasmdock external client from the sibling wasmdesk/wasmdock repo into clients/dock/dock.wasm. The dock's worker.js + sdk.js are committed in clients/dock/; only the wasm + wasm_exec.js are built. Override DOCK_DIR if wasmdock repo lives elsewhere.
    env:
      GOWORK: "off"
      GOOS: js
      GOARCH: wasm
      CGO_ENABLED: "0"
    cmds:
      - mkdir -p clients/dock
      - |
        if [ ! -d "{{.DOCK_DIR}}" ]; then
          echo "wasmdock dir not found: {{.DOCK_DIR}}" >&2
          echo "set DOCK_DIR=/path/to/wasmdesk/wasmdock" >&2
          exit 1
        fi
      - go build -trimpath -ldflags '-s -w' -o "$(pwd)/clients/dock/dock.wasm" "{{.DOCK_DIR}}/"
      - |
        root="$(go env GOROOT)"
        if [ -f "$root/lib/wasm/wasm_exec.js" ]; then
          cp "$root/lib/wasm/wasm_exec.js" clients/dock/wasm_exec.js
        else
          cp "$root/misc/wasm/wasm_exec.js" clients/dock/wasm_exec.js
        fi
      - 'echo "build:dock: wrote clients/dock/dock.wasm ($(wc -c < clients/dock/dock.wasm) bytes) + clients/dock/wasm_exec.js"'
    generates:
      - clients/dock/dock.wasm
      - clients/dock/wasm_exec.js

  build:quake:
    desc: Build the cmd/quake-wasmbox client from the sibling go-quake1/engine repo into clients/quake/quake.wasm (embeds the pak + music -- ~200 MB wasm). Override ENGINE_DIR if engine repo lives elsewhere.
    env:
      GOWORK: "off"
      GOOS: js
      GOARCH: wasm
    cmds:
      - mkdir -p clients/quake
      - |
        if [ ! -d "{{.ENGINE_DIR}}" ]; then
          echo "engine dir not found: {{.ENGINE_DIR}}" >&2
          echo "set ENGINE_DIR=/path/to/go-quake1/engine" >&2
          exit 1
        fi
      - go build -trimpath -ldflags '-s -w' -o "$(pwd)/clients/quake/quake.wasm" "{{.ENGINE_DIR}}/cmd/quake-wasmbox/"
      - 'echo "build:quake: wrote clients/quake/quake.wasm ($(wc -c < clients/quake/quake.wasm) bytes)"'
    generates:
      - clients/quake/quake.wasm

  serve:all:
    desc: Build wasmbox + hello + Quake clients, then serve on http://localhost:{{.PORT}}/. Right-click desktop -> spawn quake, or run wasmboxSpawnExternal('clients/quake/worker.js') in console.
    deps: [build:all]
    cmds:
      - 'echo "serve:all: serving http://localhost:{{.PORT}}/ -- spawn Quake via desktop right-click"'
      - ./bin/wasmbox-serve -addr :{{.PORT}}

  # ----- mirrors of go-quake1/engine's demo tasks so the user can run
  # ----- the full Quake-in-wasmbox flow from either repo -----

  demo-wasmbox:
    desc: Mirror of go-quake1/engine `task demo-wasmbox` -- build embedded-assets Quake client + start wasmbox at http://localhost:{{.PORT}}/.
    cmds:
      - task -d "{{.ENGINE_DIR}}" demo-wasmbox

  demo-wasmbox-oci:
    desc: Mirror of go-quake1/engine `task demo-wasmbox-oci` -- pack pak+music, push to local registry, build OCI-streaming client, start wasmbox. Requires Docker + oras CLI.
    cmds:
      - task -d "{{.ENGINE_DIR}}" demo-wasmbox-oci

  oci-pack:
    desc: Mirror -- pack local pak+music into OCI image layout.
    cmds:
      - task -d "{{.ENGINE_DIR}}" oci-pack

  oci-registry-up:
    desc: Mirror -- start local OCI registry on :5000 via Docker.
    cmds:
      - task -d "{{.ENGINE_DIR}}" oci-registry-up

  oci-registry-down:
    desc: Mirror -- stop the local OCI registry container.
    cmds:
      - task -d "{{.ENGINE_DIR}}" oci-registry-down

  oci-push:
    desc: Mirror -- push the packed image layout to the local registry via oras.
    cmds:
      - task -d "{{.ENGINE_DIR}}" oci-push

  build:compositor:
    desc: Build wasmbox.wasm (embeds compositor.rb)
    env:
      GOWORK: "off"
      GOOS: js
      GOARCH: wasm
    cmds:
      - go build -o wasmbox.wasm .
      - cp "$(go env GOROOT)/lib/wasm/wasm_exec.js" ./wasm_exec.js 2>/dev/null || cp "$(go env GOROOT)/misc/wasm/wasm_exec.js" ./wasm_exec.js
    generates:
      - wasmbox.wasm
      - wasm_exec.js

  build:hello:
    desc: Build the hello-world external client (clients/hello/hello.wasm)
    env:
      GOWORK: "off"
      GOOS: js
      GOARCH: wasm
    cmds:
      - go build -o clients/hello/hello.wasm ./clients/hello
    generates:
      - clients/hello/hello.wasm

  build:dock:
    desc: Build the wasmdock dock external client (clients/dock/dock.wasm)
    env:
      GOWORK: "off"
      GOOS: js
      GOARCH: wasm
      CGO_ENABLED: "0"
    cmds:
      - go build -o clients/dock/dock.wasm ./clients/dock
    generates:
      - clients/dock/dock.wasm

  build:serve:
    desc: Build the native dev server (cmd/serve) with COOP/COEP headers
    env:
      GOWORK: "off"
    cmds:
      - go build -o bin/wasmbox-serve ./cmd/serve
    generates:
      - bin/wasmbox-serve

  serve:
    desc: Build, then serve the compositor at http://localhost:{{.PORT}}/ with COOP/COEP
    deps: [build]
    cmds:
      - 'echo "serving http://localhost:{{.PORT}}/ — open /index.html"'
      - ./bin/wasmbox-serve -addr :{{.PORT}}

  test:
    desc: Run native unit tests (Ruby + Go) — no browser required
    env:
      GOWORK: "off"
    cmds:
      - go test ./clients/hello/... ./clients/dock/...
      - go run ./cmd/rbtest

  clean:
    desc: Remove the build artifacts
    cmds:
      - rm -f wasmbox.wasm wasm_exec.js clients/hello/hello.wasm clients/dock/dock.wasm
      - rm -rf bin
