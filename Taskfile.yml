# Taskfile for wasmbox — https://taskfile.dev
#
#   task            # list the available tasks
#   task build      # build wasmbox.wasm (embeds compositor.rb) + wasm_exec.js
#   task serve      # build, then serve http://localhost:8080/
#   task clean      # remove the build artifacts
#
# wasmbox is a Go module that imports the pure-Go (CGO=0) go-embedded-ruby
# interpreter and bakes compositor.rb into the binary with //go:embed, so the
# build is a plain `go build` for the js/wasm target — no interpreter checkout
# and nothing fetched at runtime.
version: "3"

vars:
  PORT: "8080"

tasks:
  default:
    desc: List the available tasks
    silent: true
    cmds:
      - task --list

  build:
    desc: Build wasmbox.wasm (embeds compositor.rb) and copy the matching wasm_exec.js
    env:
      GOWORK: "off"
      GOOS: js
      GOARCH: wasm
    cmds:
      - go build -o wasmbox.wasm .
      - cp "$(go env GOROOT)/lib/wasm/wasm_exec.js" ./wasm_exec.js 2>/dev/null || cp "$(go env GOROOT)/misc/wasm/wasm_exec.js" ./wasm_exec.js
    generates:
      - wasmbox.wasm
      - wasm_exec.js

  serve:
    desc: Build, then serve the compositor at http://localhost:{{.PORT}}/
    deps: [build]
    cmds:
      - 'echo "serving http://localhost:{{.PORT}}/ — open /index.html"'
      - python3 -m http.server {{.PORT}}

  clean:
    desc: Remove the build artifacts (wasmbox.wasm, wasm_exec.js)
    cmds:
      - rm -f wasmbox.wasm wasm_exec.js
