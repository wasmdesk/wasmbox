# Headless CI for wasmbox — the pure-Go Ruby WASM compositor.
#
# Two jobs:
#   build-and-test  — go vet, build every wasm target + cmd/serve, run the
#                     native scene tests, and run cmd/rbtest (proving
#                     compositor.rb parses + executes under the native
#                     go-embedded-ruby interpreter, not only under MRI).
#   render          — build the wasm, serve it with cmd/serve (COOP/COEP so
#                     SharedArrayBuffer works), and drive a headless Chromium
#                     through test/render.mjs to prove the compositor actually
#                     boots, paints, persists its layout, and renders the dock.
#
# CGO is off everywhere (the whole stack is pure Go); GOWORK=off keeps the
# module self-contained.
name: CI

on:
  push:
    branches: [main, ci-headless]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  GOWORK: "off"
  CGO_ENABLED: "0"

jobs:
  build-and-test:
    name: Build + native tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"
          check-latest: true
          cache: true

      - name: go vet
        run: go vet ./...

      - name: Build the compositor wasm (embeds compositor.rb)
        run: GOOS=js GOARCH=wasm go build -o wasmbox.wasm .

      - name: Build every external client wasm
        run: |
          for dir in clients/*/; do
            name="$(basename "$dir")"
            if [ -f "${dir}main.go" ]; then
              echo "building ${name}.wasm"
              GOOS=js GOARCH=wasm go build -o "${dir}${name}.wasm" "./clients/${name}"
            fi
          done

      - name: Build the dev server (cmd/serve)
        run: go build -o bin/wasmbox-serve ./cmd/serve

      - name: Native scene tests
        run: go test ./...

      - name: rbtest — compositor.rb under go-embedded-ruby
        run: go run ./cmd/rbtest

  render:
    name: Headless render (boot + persistence + dock)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"
          check-latest: true
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Seqlock fence unit test (no deps)
        working-directory: test
        run: node seqlock.test.mjs

      - name: Popup multi-surface SDK unit test (no deps)
        working-directory: test
        run: node popup-sdk.test.mjs

      - name: Build wasm + clients + serve (task build)
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: task build
        run: task build

      - name: Install render-test deps
        working-directory: test
        run: npm install

      - name: Install Playwright browsers (chromium + firefox + webkit)
        working-directory: test
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Serve the compositor (cmd/serve, COOP/COEP) in the background
        run: |
          ./bin/wasmbox-serve -addr :8137 > serve.log 2>&1 &
          echo "$!" > serve.pid
          # Wait for the server to answer before launching the browser.
          for i in $(seq 1 50); do
            if curl -fsS -o /dev/null "http://127.0.0.1:8137/wasmbox.wasm"; then
              echo "cmd/serve is up"; break
            fi
            sleep 0.2
          done

      - name: Run headless render test
        working-directory: test
        env:
          WASMBOX_BASE_URL: "http://127.0.0.1:8137"
        run: node render.mjs

      - name: Run headless popup probe (open + grab-dismiss)
        working-directory: test
        env:
          WASMBOX_BASE_URL: "http://127.0.0.1:8137"
        run: node probe-popup.mjs

      - name: Run headless nested-popup probe (submenu + layered grab)
        working-directory: test
        env:
          WASMBOX_BASE_URL: "http://127.0.0.1:8137"
        run: node probe-nested.mjs

      - name: Run headless popup-keyboard probe (arrow routing + Escape)
        working-directory: test
        env:
          WASMBOX_BASE_URL: "http://127.0.0.1:8137"
        run: node probe-keyboard.mjs

      - name: Run headless Files context-menu probe (no compositor-menu conflict)
        working-directory: test
        env:
          WASMBOX_BASE_URL: "http://127.0.0.1:8137"
        run: node probe-files-contextmenu.mjs

      - name: Run headless window-shade probe (two-finger swipe fold/unfold)
        working-directory: test
        env:
          WASMBOX_BASE_URL: "http://127.0.0.1:8137"
        run: node probe-shade.mjs

      - name: Run headless Frame-matrix probe (16 frames boot + paint + hash-distinct)
        working-directory: test
        env:
          WASMBOX_BASE_URL: "http://127.0.0.1:8137/"
        run: node probe-frame-matrix.mjs

      - name: Run headless Firefox memory-leak probe (compositor 60Hz blit fix)
        working-directory: test
        env:
          WASMBOX_BASE_URL: "http://127.0.0.1:8137/"
          IDLE_SECONDS: "15"
          MAX_GROWTH_MB: "8"
        run: node probe-firefox-leak.mjs chromium

      - name: Run headless workspaces probe (isolation + reversible iconbar)
        working-directory: test
        run: node probe-workspaces.mjs

      - name: Run headless minimize/restore probe (via dock geometry hook)
        working-directory: test
        run: node probe-minimize.mjs

      - name: Run headless iconbar probe (focus indicator + click focus/close)
        working-directory: test
        run: node probe-iconbar.mjs

      - name: Run headless root-menu probe (menu/submenu/launch/workspace)
        working-directory: test
        run: node probe-rootmenu.mjs

      - name: Run headless Files client probe
        working-directory: test
        run: node probe-files.mjs

      - name: Run headless client loading-progress probe
        working-directory: test
        run: node probe-loading-progress.mjs

      - name: Run headless Terminal probe
        working-directory: test
        run: node probe-terminal.mjs

      - name: Run headless Terminal completion probe
        working-directory: test
        run: node probe-terminal-complete.mjs

      - name: Run headless Terminal history probe
        working-directory: test
        run: node probe-terminal-history.mjs

      - name: Run headless Terminal tab-polish probe
        working-directory: test
        run: node probe-terminal-tab-polish.mjs

      - name: Run headless Terminal coreutils probe
        working-directory: test
        run: node probe-terminal-coreutils.mjs

      - name: Run headless shell-pipes probe
        working-directory: test
        run: node probe-shell-pipes.mjs

      - name: Run headless grep/regex probe
        working-directory: test
        run: node probe-grep-regex.mjs

      - name: Run headless theme round-trip probe (light/dark/adwaita switch)
        working-directory: test
        run: node probe-theme.mjs

      - name: Run cross-browser dom-window probe (chromium + firefox + webkit)
        working-directory: test
        env:
          WASMBOX_BASE_URL: "http://127.0.0.1:8137/"
        run: node probe-dom-window.mjs

      - name: Run headless VS Code client probe (syntax highlighting + sections)
        working-directory: test
        run: node probe-code.mjs

      - name: Run headless Fluxbox-dock probe (sections + live iconbar buttons)
        working-directory: test
        run: node probe-wasmdock-fluxbox.mjs

      - name: Run OCIAppsLoader unit test (parse/manifest/blob-fallback/digest)
        working-directory: test
        run: node ociapps-loader.test.mjs

      - name: Run headless spawn-from-OCI probe (canned /v2 manifest + blobs)
        working-directory: test
        env:
          WASMBOX_BASE_URL: "http://127.0.0.1:8137"
        run: node probe-spawn-from-oci.mjs

      # NOTE: the Quake saved-window-size probe (test/probe-quake-saved-size.mjs)
      # is intentionally NOT wired here yet. It builds the client from the
      # public go-quake1/engine sibling in asset-less synthbsp mode (no
      # copyrighted pak needed), but it asserts the engine renders the SAB at
      # the SAVED window size -- a fix that currently lives only in unpushed
      # engine WIP. On public go-quake1/engine main the engine still renders at
      # the old hardcoded 320x240, so the probe would fail. Enable it (checkout
      # go-quake1/engine -> build quake.wasm -> run the probe, AFTER the other
      # probes since autoSpawnIfPresent spawns Quake once the wasm exists) once
      # that saved-size fix lands on engine main.

      - name: Stop the server
        if: always()
        run: |
          if [ -f serve.pid ]; then kill "$(cat serve.pid)" 2>/dev/null || true; fi
          echo "---- serve.log ----"; cat serve.log || true

  pages-oci:
    name: Pages OCI delivery (same-origin /v2 + coi-serviceworker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"
          check-latest: true
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # The build-time OCI tooling (ociapps-pack / ociapps-static) lives in the
      # public sibling repo; check it out and point OCIAPPS_DIR at it.
      - name: Checkout wasmdesk/ociapps (OCI packaging CLIs)
        uses: actions/checkout@v4
        with:
          repository: wasmdesk/ociapps
          path: .ociapps

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      # Build only what the Pages/hello path needs: the compositor wasm + the
      # dev server + the hello client packed into an OCI layout. No dock /
      # terminal / files (the probe pulls only hello via ?ociapps_only=hello),
      # so no wasmdock sibling and no copyrighted assets are involved.
      - name: Build compositor + serve + pack hello into an OCI layout
        env:
          OCIAPPS_DIR: .ociapps
        run: task build:compositor build:serve ociapps:pack:hello

      - name: Assemble a header-less Pages site with a same-origin /v2 hello mirror
        run: |
          SITE=/tmp/wasmbox-site
          rm -rf "$SITE" && mkdir -p "$SITE/clients/sdk"
          cp index.html coi-serviceworker.js bridge.js boot-config.js \
             compositor.worker.js ociapps-loader.js wasm_exec.js wasmbox.wasm "$SITE/"
          cp clients/sdk/sdk.js "$SITE/clients/sdk/sdk.js"
          touch "$SITE/.nojekyll"
          ./bin/ociapps-static -in /tmp/ociapps-hello -repo hello -out "$SITE"
          echo "assembled $SITE ($(find "$SITE/v2" -type f | wc -l | tr -d ' ') /v2 files)"

      - name: Serve the site with NO COOP/COEP headers (simulate GitHub Pages)
        run: |
          ./bin/wasmbox-serve -addr :8137 -dir /tmp/wasmbox-site -no-coi > serve.log 2>&1 &
          echo "$!" > serve.pid
          for i in $(seq 1 40); do
            if curl -fsS -o /dev/null "http://127.0.0.1:8137/wasmbox.wasm"; then echo "serve up"; break; fi
            sleep 0.5
          done

      - name: Install probe deps + Chromium
        working-directory: test
        run: |
          npm install
          npx playwright install --with-deps chromium

      - name: Run the Pages-OCI probe (crossOriginIsolated + same-origin /v2 pull)
        working-directory: test
        env:
          WASMBOX_BASE_URL: "http://127.0.0.1:8137"
        run: node probe-pages-oci.mjs

      - name: Stop the server
        if: always()
        run: |
          if [ -f serve.pid ]; then kill "$(cat serve.pid)" 2>/dev/null || true; fi
          echo "---- serve.log ----"; cat serve.log || true
