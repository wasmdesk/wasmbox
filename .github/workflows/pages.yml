# Deploy wasmbox to GitHub Pages: the desktop + a SAME-ORIGIN static /v2 OCI
# mirror of each client app, so the whole thing loads from a static host with
# no server, no CORS and no token (ghcr/registries refuse cross-origin browser
# reads; the artifacts are served beside the page instead).
#
# Cross-origin isolation (needed for SharedArrayBuffer) is supplied at runtime
# by coi-serviceworker.js, since Pages cannot set COOP/COEP headers.
#
# The site ships the FULL clients/ tree (every wasm client + the loom DOM
# bundle at /loom/), so every root-menu / dock launch resolves same-origin,
# exactly like the dev server — a managed OCI registry can't back the browser
# directly (no CORS), so the apps are served beside the page. Quake builds from
# the public go-quake1/engine sibling in asset-less synthbsp mode (no
# copyrighted pak). The "vscode" code-server dom-window still needs a live
# backend, so on this static host use the pure-Go "code" client (labelled "VS
# Code" in the menu). The /v2 mirror + ghcr publish below are the additive
# OCI-streaming demo path, not the launch path.
name: pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  packages: write   # publish the canonical app images to ghcr.io/wasmdesk/<app>

# One in-flight deploy at a time; let a newer push supersede an older run.
concurrency:
  group: pages
  cancel-in-progress: true

env:
  GOWORK: "off"
  CGO_ENABLED: "0"

jobs:
  build:
    name: Build desktop + static /v2 mirror
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The ociapps-pack + ociapps-static CLIs come from the sibling repo.
      - name: Checkout wasmdesk/ociapps
        uses: actions/checkout@v4
        with:
          repository: wasmdesk/ociapps
          path: _ociapps

      # The Quake client is built on demand from the public go-quake1/engine
      # sibling (asset-less synthbsp mode — no copyrighted pak, ~12 MB wasm,
      # well under the Pages 100 MB/file limit).
      - name: Checkout go-quake1/engine
        uses: actions/checkout@v4
        with:
          repository: go-quake1/engine
          path: _engine

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"
          check-latest: true
          cache: true

      - name: Build ociapps CLIs (pack + static mirror)
        run: |
          mkdir -p bin
          go -C _ociapps build -o "$PWD/bin/ociapps-pack"   ./cmd/ociapps-pack
          go -C _ociapps build -o "$PWD/bin/ociapps-static" ./cmd/ociapps-static
          go -C _ociapps build -o "$PWD/bin/ociapps-push"   ./cmd/ociapps-push

      - name: Build the compositor wasm (embeds compositor.rb) + wasm_exec.js
        run: |
          GOOS=js GOARCH=wasm go build -o wasmbox.wasm .
          root="$(go env GOROOT)"
          cp "$root/lib/wasm/wasm_exec.js" ./wasm_exec.js 2>/dev/null || cp "$root/misc/wasm/wasm_exec.js" ./wasm_exec.js

      - name: Build + prep every in-repo client app
        run: |
          set -e
          root="$(go env GOROOT)"
          wexec="$root/lib/wasm/wasm_exec.js"; [ -f "$wexec" ] || wexec="$root/misc/wasm/wasm_exec.js"
          # Every wasm client the root-menu / dock can launch. Each ships its own
          # sdk.js + wasm_exec.js beside its worker.js so it resolves same-origin.
          for app in hello terminal files code showcase calculator notepad; do
            GOOS=js GOARCH=wasm go build -o "clients/$app/$app.wasm" "./clients/$app"
            cp clients/sdk/sdk.js "clients/$app/sdk.js"
            cp "$wexec" "clients/$app/wasm_exec.js"
          done
          # dock builds in-repo too, but ships its OWN sdk.js + worker.js
          # (committed, smaller) — only build the wasm + copy wasm_exec.js; do
          # NOT overwrite its sdk.js.
          GOOS=js GOARCH=wasm go build -o clients/dock/dock.wasm ./clients/dock
          cp "$wexec" clients/dock/wasm_exec.js
          # Quake: asset-less synthbsp build from the engine sibling. The OCI
          # reference 404s at runtime on a static host, so the engine falls back
          # to synthetic assets + synthbsp — no copyrighted pak needed. The quake
          # worker.js loads ../../wasm_exec.js (the site root copy), so no
          # per-client wasm_exec is required here.
          GOWORK=off GOOS=js GOARCH=wasm go -C _engine build -trimpath -tags no_embed_assets \
            -ldflags "-s -w -X main.OCIReference=/quake-assets:1.0" \
            -o "$PWD/clients/quake/quake.wasm" ./cmd/quake-wasmbox/

      - name: Assemble the Pages site (desktop + shared SDK + static /v2 mirror)
        run: |
          set -e
          SITE=_site
          rm -rf "$SITE" && mkdir -p "$SITE"
          cp index.html coi-serviceworker.js bridge.js boot-config.js compositor.worker.js ociapps-loader.js wasm_exec.js wasmbox.wasm "$SITE/"
          # Ship the FULL client tree so every root-menu / dock launch resolves
          # same-origin exactly like the dev server (clients spawn by static path
          # clients/<app>/worker.js or by DOM path, NOT via the /v2 mirror — the
          # mirror below is the additive ?ociapps OCI-streaming demo only).
          cp -R clients "$SITE/clients"
          # Mount the loom DOM bundle at its descriptor path (/loom/, built with
          # vite --base=/loom/) so the loom dom-window iframe resolves same-origin.
          mkdir -p "$SITE/loom"
          cp -R clients/loom/dist/. "$SITE/loom/"
          # .nojekyll so Pages serves the blobs/sha256:<hex> files (colon in the
          # name) verbatim instead of running them through Jekyll.
          touch "$SITE/.nojekyll"
          for app in hello dock terminal files; do
            ./bin/ociapps-pack -in "clients/$app" -manifest "packs/$app.toml" -out "/tmp/oci-$app" -ref "$app:latest"
            ./bin/ociapps-static -in "/tmp/oci-$app" -repo "$app" -out "$SITE"
          done
          echo "assembled $SITE: $(find "$SITE/v2" -type f | wc -l) /v2 files"

      # Publish the canonical app images to ghcr (the source of truth). The
      # same-origin /v2 mirror above is the runtime source; ghcr is the registry.
      #
      # Auth: prefer a PAT in secrets.GHCR_PAT (a token with write:packages) and
      # fall back to GITHUB_TOKEN. The GITHUB_TOKEN path was observed to exit 0
      # WITHOUT creating the packages (a silent no-op), so after each push we
      # VERIFY the exact manifest digest is live on ghcr and fail loudly if not —
      # no more green-lying. (No `set -x`: it would echo the token into the log.)
      - name: Publish app images to ghcr.io/wasmdesk
        if: github.event_name == 'push'
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_PAT || secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        run: |
          set -eu
          for app in hello dock terminal files; do
            ./bin/ociapps-push -in "/tmp/oci-$app" \
              -ref "ghcr.io/wasmdesk/$app:latest" -scheme https \
              -username "$GHCR_USER"
            # Verify the pushed manifest actually landed (by digest) on ghcr.
            want=$(jq -r '.manifests[0].digest' "/tmp/oci-$app/index.json")
            tok=$(curl -fsS -u "$GHCR_USER:$GHCR_TOKEN" \
              "https://ghcr.io/token?scope=repository:wasmdesk/$app:pull&service=ghcr.io" \
              | sed -E 's/.*"token":"([^"]+)".*/\1/')
            got=$(curl -fsS -D - -o /dev/null \
              -H "Authorization: Bearer $tok" \
              -H "Accept: application/vnd.oci.image.manifest.v1+json" \
              "https://ghcr.io/v2/wasmdesk/$app/manifests/latest" \
              | tr -d '\r' | awk -F': ' 'tolower($1)=="docker-content-digest"{print $2}')
            echo "verify ghcr/$app: want=$want got=${got:-none}"
            [ "$want" = "$got" ] || { echo "::error::ghcr publish of $app did not land the expected manifest (want $want, got ${got:-none}) — check the GHCR_PAT/GITHUB_TOKEN packages:write auth"; exit 1; }
          done

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
