# ociapps-pack manifest for the files placeholder client.
#
# Pack the three files the OCI spawn path needs. The SDK is loaded from an
# absolute URL by clients/files/worker.js at run time.

mediatype = "application/vnd.oci.image.manifest.v1+json"

[files]
"worker.js"    = "worker.js"
"wasm_exec.js" = "wasm_exec.js"
"sdk.js"       = "sdk.js"
"files.wasm"   = "files.wasm"
